<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Experience Tribe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #111 0%, transparent 40%);
            min-height: 100 screen;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            padding: 4rem 2rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-enter {
            background: #fff;
            color: #000;
            padding: 1.25rem 2.5rem;
            border-radius: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-style: italic;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .btn-enter:hover {
            transform: scale(1.05) translateY(-5px);
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.3);
        }

        .logo-text {
            font-size: 3rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .animate-fade-up {
            animation: fadeUp 1s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card animate-fade-up">
        <div class="mb-8 inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-600/20 border border-blue-500/30">
            <i class="fas fa-bolt text-3xl text-blue-500"></i>
        </div>

        <h1 class="logo-text">Experience <span class="text-blue-500">Tribe</span></h1>
        <p class="text-zinc-500 font-medium mb-10 text-sm uppercase tracking-widest">Digital Learning Academy</p>
        
        <div class="space-y-6">
            <p class="text-zinc-400 text-sm leading-relaxed mb-8 px-4">
                Benvenuto nel portale ufficiale dell'Academy. <br>
                Tutta la formazione di cui hai bisogno in un unico posto.
            </p>

            <a href="https://experiencetribe.altervista.org/index.php" class="btn-enter">
                Entra nell'Academy
                <i class="fas fa-chevron-right text-xs"></i>
            </a>
        </div>

        <div class="mt-12 pt-8 border-t border-white/5">
            <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-[0.3em]">Authorized Access Only</p>
        </div>
    </div>

</body>
</html>
