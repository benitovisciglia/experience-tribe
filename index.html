<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experience Tribe | Academy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#050505;color:#fff;font-family:Inter,sans-serif}
.hidden{display:none}
.video-row{display:flex;overflow-x:auto;gap:1rem;padding:1rem 0}
.video-card{min-width:260px;background:#111;border-radius:14px;overflow:hidden;transition:.3s;border:1px solid #222}
.video-card:hover{transform:translateY(-6px);border-color:#3b82f6;box-shadow:0 0 20px rgba(59,130,246,.3)}
.hero video{width:100%;border-radius:20px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="fixed inset-0 flex items-center justify-center bg-black">
<div class="bg-zinc-900 p-8 rounded-2xl w-full max-w-sm text-center">
<h1 class="text-3xl font-black text-blue-500">Experience Tribe</h1>
<input id="userInput" placeholder="Username" class="w-full mt-4 p-3 bg-black border border-zinc-700 rounded">
<input id="passwordInput" type="password" placeholder="Password" class="w-full mt-2 p-3 bg-black border border-zinc-700 rounded">
<button onclick="login()" class="w-full mt-4 p-3 bg-blue-600 rounded font-bold">Entra</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header class="p-4 flex justify-between items-center border-b border-zinc-800">
<h1 class="text-xl font-bold text-blue-500">Academy</h1>
<input id="search" placeholder="Cerca..." class="p-2 bg-black border border-zinc-700 rounded">
</header>

<!-- HERO -->
<div class="p-6 hero">
<video id="heroVideo" controls></video>
<h2 id="heroTitle" class="mt-4 text-2xl font-bold"></h2>
</div>

<!-- CATEGORIE -->
<div id="categories" class="p-6"></div>

</div>

<script>

const USERS=[{u:"admin",p:"1234",n:"Boss"}];

const HERO={
title:"I 7 Ladri del Tempo",
url:"https://www.w3schools.com/html/mov_bbb.mp4"
};

const DATA=[
{
name:"Formazione Base",
videos:[
{title:"Introduzione",url:"https://www.w3schools.com/html/mov_bbb.mp4"},
{title:"Mentalità",url:"https://www.w3schools.com/html/movie.mp4"}
]
},
{
name:"Social",
videos:[
{title:"TikTok Strategy",url:"https://www.w3schools.com/html/mov_bbb.mp4"}
]
}
];

function login(){
const u=userInput.value;
const p=passwordInput.value;
const ok=USERS.find(x=>x.u===u&&x.p===p);
if(!ok) return alert("Errore");
localStorage.setItem("auth","1");
start();
}

function start(){
loginPage.classList.add("hidden");
app.classList.remove("hidden");
loadHero();
render();
}

function loadHero(){
heroVideo.src=HERO.url;
heroTitle.innerText=HERO.title;
}

function render(filter=""){
categories.innerHTML="";

DATA.forEach(cat=>{
const vids=cat.videos.filter(v=>v.title.toLowerCase().includes(filter.toLowerCase()));
if(!vids.length) return;

const row=document.createElement("div");
row.innerHTML=`
<h2 class="text-sm text-zinc-400 uppercase mb-2">${cat.name}</h2>
<div class="video-row">
${vids.map(v=>`
<div class="video-card">
<video src="${v.url}" controls class="w-full"></video>
<div class="p-3 text-sm">${v.title}</div>
</div>`).join("")}
</div>`;

categories.appendChild(row);
});
}

search.addEventListener("input",e=>render(e.target.value));

if(localStorage.getItem("auth")) start();

</script>

</body>
</html>
