<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Tribe | Academy</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Slider video */
        .video-row {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 1rem;
            padding: 0.5rem 0 2rem 0;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .video-row::-webkit-scrollbar { display: none; }

        .video-card { 
            flex: 0 0 280px; 
            background: #0f0f0f; 
            border-radius: 16px; 
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .video-card { flex: 0 0 85vw; } /* Più grandi su mobile per facilitare lo swipe */
        }

        /* Container riga */
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .category-title {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #e5e5e5;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Barra arancione accanto al titolo come da screenshot */
        .title-accent {
            width: 3px;
            height: 18px;
            background-color: #f97316; /* Arancione Chogan */
            border-radius: 10px;
        }

        /* Stile Frecce identico allo screenshot */
        .nav-controls {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            width: 38px;
            height: 38px;
            background: #1f1f1f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: #ffffff;
            transition: background 0.2s;
        }

        .nav-btn:hover { background: #333333; }
        .nav-btn i { font-size: 0.9rem; }

        .aspect-video { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .hero-gradient { background: linear-gradient(to bottom, transparent 0%, rgba(5,5,5,1) 90%); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black text-white">
        <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-800 w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-black text-orange-500 mb-6 uppercase tracking-tighter">Experience Tribe</h1>
            <input type="password" id="passwordInput" autofocus placeholder="Password d'Accesso" 
                   class="w-full p-4 rounded-xl bg-black border border-zinc-700 text-white mb-4 text-center text-lg outline-none focus:border-orange-500">
            <button onclick="checkPassword()" class="w-full p-4 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-xl transition-all uppercase tracking-widest text-sm">Entra</button>
            <p id="errorMessage" class="text-red-500 text-xs mt-3 hidden">Password errata.</p>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="p-6 md:px-12 md:py-8 flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
            <div class="flex items-center gap-4">
                <img src="ET Monogram bianco.png" alt="Logo" class="w-12 h-12 object-contain">
                <div>
                    <h1 class="text-2xl font-black text-orange-500 tracking-tighter leading-none uppercase">EXPERIENCE TRIBE</h1>
                    <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] font-bold mt-1">Training Academy</p>
                </div>
            </div>

            <div class="flex items-center gap-4 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="Cerca formazione..." 
                       class="bg-zinc-900 border border-zinc-800 p-3 px-6 rounded-2xl w-full md:w-64 text-sm text-white outline-none focus:border-orange-500 transition-all">
                <button onclick="logout()" class="text-zinc-600 hover:text-white text-xs font-bold uppercase tracking-widest">Esci</button>
            </div>
        </header>

        <section id="heroSection" class="mb-10 px-4 md:px-12">
            <div class="relative w-full max-w-6xl mx-auto overflow-hidden rounded-3xl bg-black shadow-2xl">
                <div class="aspect-video">
                    <div id="heroPlayerContainer" class="w-full h-full"></div>
                </div>
                <div class="absolute bottom-0 left-0 w-full p-6 md:p-10 hero-gradient pointer-events-none">
                    <h2 id="heroTitle" class="text-2xl md:text-4xl font-black uppercase tracking-tighter text-white"></h2>
                    <p id="heroDesc" class="text-zinc-400 text-sm md:text-base mt-2 max-w-2xl line-clamp-2 italic opacity-80"></p>
                </div>
            </div>
        </section>

        <div id="categoriesContainer" class="px-6 md:px-12"></div>
    </div>

    <script>
        const THE_PASSWORD = "ET2026IR";

        const HERO_VIDEO = {
            id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=cczcesmz&raw=1",
            title: "I 7 LADRI DEL TEMPO",
            desc: "Smetti di rincorrere le ore. Scopri i 7 errori invisibili che prosciugano la tua energia.",
        };

        const categories = [
            { name: "PRIMA FORMAZIONE NUOVO CONSULENTE", videos: [
                { id: "https://www.dropbox.com/scl/fi/a0lswxi350isedvhqvds5/ESEMPIO-CHIAMATA-per-appuntamento-consigli-vari.mp4?rlkey=5jy4isxa0enbpv8mqwei08m1q&st=nvskybgz&dl=0", title: "ESEMPIO CHIAMATA per appuntamento" },
                { id: "https://www.dropbox.com/scl/fi/4fp5xqoyvnbv8j3is1t4s/I-PRIIMI-PASSI-FOLLOW-UP-CONSULENTE.mp4?rlkey=px2tsn949ee0z3m6tr80vjl9y&st=jqcjvfgi&dl=0", title: "I PRIMI PASSI FOLLOW UP CONSULENTE" },
                { id: "https://www.dropbox.com/scl/fi/0kmg63wtf8eax3n3sxbag/I-PRIMI-PASSI-BENVENUTO.mp4?rlkey=x9zf0f4w1yr436fvw4s7m7pzc&st=ldls1rp6&dl=0", title: "I PRIMI PASSI BENVENUTO" },
                { id: "https://www.dropbox.com/scl/fi/pu07lqfkqoqxyhbeky6ou/PRIMA-FORMAZIONE-NUOVO-CONSULENTE.mp4?rlkey=9rxdp0i2h6umivr464zl3s2zi&st=5136ln4b&dl=0", title: "PRIMA FORMAZIONE NUOVO CONSULENTE" }
            ]},
            { name: "FORMAZIONE 2026", videos: [
                { id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=7givwfa7&dl=0", title: "I 7 LADRI DEL TEMPO - COME AVERE PIU' TEMPO" },
                { id: "https://www.dropbox.com/scl/fi/q4iyap1gnnj2bpsjm7ll0/END-OF-MONTH-CALL.mp4?rlkey=dzk5wrkm65kxflgecjwrfsvm9&st=siu4s76m&dl=0", title: "END OF MONTH CALL" },
                { id: "https://www.dropbox.com/scl/fi/h4hgjbggp4lsa99husd2c/NOVITA-CHOGAN-MARZO-2026.mp4?rlkey=n5golm2h0ciu2j4s3uctok7wc&st=jevemisw&dl=0", title: "NOVITA' CHOGAN MARZO 2026" }
            ]},
            { name: "FORMAZIONE DI BASE", videos: [
                { id: "https://www.dropbox.com/scl/fi/0pbktidktqcgyg4a72p78/I-PRIMI-PASSI.mp4?rlkey=56trbs2davw5160ujbo7dnlwa&st=i9rtpyml&dl=0", title: "I PRIMI PASSI" },
                { id: "https://www.dropbox.com/scl/fi/n41760d6k5n0yza9e5il7/formazione-importante-NUOVO-CONSULENTE.mp4?rlkey=pqk53jg77j58dtc8v2e2ya3k1&st=xs5y78y9&dl=0", title: "formazione importante NUOVO CONSULENTE" }
            ]}
        ];

        function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                localStorage.setItem('tribe_access', 'granted');
                showContent();
            } else { document.getElementById('errorMessage').classList.remove('hidden'); }
        }

        function showContent() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
        }

        function logout() { localStorage.removeItem('tribe_access'); location.reload(); }
        if (localStorage.getItem('tribe_access') === 'granted') showContent();

        function renderHero() {
            const container = document.getElementById('heroPlayerContainer');
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;
            const url = HERO_VIDEO.id.replace('dl=0', 'raw=1');
            container.innerHTML = `<video controls playsinline class="w-full h-full object-cover"><source src="${url}" type="video/mp4"></video>`;
        }

        // Funzione per scorrere i video
        window.scrollRow = function(id, direction) {
            const row = document.getElementById(id);
            const scrollAmount = window.innerWidth > 768 ? 600 : 300;
            row.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
        };

        function renderVideos(filter = "") {
            const container = document.getElementById('categoriesContainer');
            const hero = document.getElementById('heroSection');
            container.innerHTML = "";
            
            if (filter.trim() !== "") { hero.classList.add('hidden'); } 
            else { hero.classList.remove('hidden'); }

            categories.forEach((cat, idx) => {
                const filteredVideos = cat.videos.filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));
                if (filteredVideos.length > 0) {
                    const rowId = `row-${idx}`;
                    const section = document.createElement('div');
                    section.className = "mb-12";
                    
                    let cardsHtml = filteredVideos.map(v => `
                        <div class="video-card">
                            <div class="aspect-video">
                                <video controls preload="metadata" playsinline>
                                    <source src="${v.id.replace('dl=0', 'raw=1')}" type="video/mp4">
                                </video>
                            </div>
                            <div class="p-4 bg-[#0f0f0f]">
                                <h3 class="font-bold text-[11px] text-zinc-100 line-clamp-2 h-8 uppercase tracking-tight">${v.title}</h3>
                                <div class="flex justify-between items-center mt-3">
                                    <span class="text-[9px] text-orange-500 font-black tracking-widest uppercase">Academy</span>
                                    <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-tighter">Cloud Stream</span>
                                </div>
                            </div>
                        </div>
                    `).join('');

                    section.innerHTML = `
                        <div class="category-header">
                            <div class="category-title">
                                <span class="title-accent"></span>
                                ${cat.name}
                            </div>
                            <div class="nav-controls">
                                <button class="nav-btn" onclick="scrollRow('${rowId}', -1)">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <button class="nav-btn" onclick="scrollRow('${rowId}', 1)">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                        <div id="${rowId}" class="video-row">${cardsHtml}</div>
                    `;
                    container.appendChild(section);
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        document.getElementById('passwordInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') checkPassword() });
    </script>
</body>
</html>
