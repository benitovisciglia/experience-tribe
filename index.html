            } else { alert("Password Errata"); }

        function loadApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
        }

        function switchSection(type) {
            const videoSection = document.getElementById('videoSection'); // Il contenitore che include l'Hero
            const catalogSection = document.getElementById('catalogSection');
            const btnV = document.getElementById('tabVideo');
            const btnC = document.getElementById('tabCataloghi');
            const heroVideo = document.querySelector('#heroPlayer video');
        
            if (type === 'video') {
                videoSection.classList.remove('hidden');
                catalogSection.classList.add('hidden');
                
                // Stile bottoni header
                btnV.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full bg-blue-600 text-white font-bold text-[10px] uppercase tracking-widest";
                btnC.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full text-zinc-500 font-bold text-[10px] uppercase tracking-widest hover:text-white";
            } else {
                // Nascondiamo TUTTA la sezione video (Hero incluso)
                videoSection.classList.add('hidden');
                catalogSection.classList.remove('hidden');
                
                // Stoppiamo il video se sta andando
                if (heroVideo) heroVideo.pause();
        
                // Stile bottoni header
                btnC.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full bg-blue-600 text-white font-bold text-[10px] uppercase tracking-widest";
                btnV.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full text-zinc-500 font-bold text-[10px] uppercase tracking-widest hover:text-white";
                
                renderCatalogs();
            }
        }

        function renderHero() {

            document.getElementById('heroPlayer').innerHTML = `<video controls playsinline class="w-full h-full object-cover"><source src="${HERO_VIDEO.id}" type="video/mp4"></video>`;
        }

        function renderVideos(search = "") {

            const heroSection = document.getElementById('heroSection'); // Puntiamo all'Hero

                }

                if (filtered.length === 0) return;
        
                const rowId = `row-${idx}`;
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="category-header">
                        <h2 class="category-title"><i class="fas fa-play text-blue-500 text-[8px]"></i> ${cat.name}</h2>
                        <div class="nav-controls flex gap-2">
                            <button class="nav-btn" onclick="scrollRow('${rowId}', -1)"><i class="fas fa-chevron-left"></i></button>
                            <button class="nav-btn" onclick="scrollRow('${rowId}', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div id="${rowId}" class="video-row">${filtered.map(v => `
                        <div class="video-card">
                            <div class="aspect-video bg-black">
                                <video preload="metadata" playsinline class="w-full h-full object-cover" 
                                       onclick="this.play(); this.controls=true"
                                       poster="favicon.png">
                                    <source src="${v.id.includes('raw=1') ? v.id : v.id.replace('dl=0', 'raw=1')}#t=0.5" type="video/mp4">
                                </video>
                            </div>
                            <div class="p-4"><h3 class="text-[10px] font-bold uppercase text-zinc-100">${v.title}</h3></div>
                        </div>
                    `).join('')}</div>
                `;
                container.appendChild(section);
            });
        }

        function renderCatalogs() {
    const container = document.getElementById('catalogGrid'); // Assicurati che l'ID sia quello giusto
    container.innerHTML = catalogs.map(c => `
        <a href="${c.link}" target="_blank" class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl flex items-center gap-4 hover:border-blue-500 transition-all group">
            <div class="text-4xl group-hover:scale-110 transition-transform">${c.icon}</div>
            <div class="flex-1">
                <h3 class="text-white font-bold group-hover:text-blue-400 uppercase text-xs tracking-tight">${c.title}</h3>
                <p class="text-zinc-500 text-[10px] uppercase mt-1">Clicca per scaricare PDF</p>
            </div>
            <i class="fas fa-download text-zinc-700 group-hover:text-blue-500 transition-colors"></i>
        </a>
    `).join('');
}

        window.scrollRow = (id, dir) => {
            const row = document.getElementById(id);
            row.scrollBy({ left: dir * 300, behavior: 'smooth' });
        };

        function logout() { localStorage.removeItem('et_auth'); location.reload(); }
        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        if (localStorage.getItem('et_auth') === 'true') loadApp();
    </script>
</body>
</html>
