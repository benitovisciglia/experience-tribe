<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experience Tribe | Academy</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:white; font-family:Inter, sans-serif; }
.video-row { display:flex; overflow-x:auto; gap:1rem; padding:1rem 0; }
.video-card { min-width:260px; background:#111; border-radius:12px; overflow:hidden; transition:.3s; }
.video-card:hover { transform:translateY(-5px); border:1px solid #3b82f6; }
.hidden { display:none }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="fixed inset-0 flex items-center justify-center bg-black">
<div class="bg-zinc-900 p-8 rounded-2xl w-full max-w-sm text-center">
<h1 class="text-2xl font-bold text-blue-500">Experience Tribe</h1>
<input id="userInput" placeholder="Username" class="w-full mt-4 p-3 bg-black border border-zinc-700">
<input id="passwordInput" type="password" placeholder="Password" class="w-full mt-2 p-3 bg-black border border-zinc-700">
<button onclick="login()" class="w-full mt-4 p-3 bg-blue-600">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden p-6">
<input id="search" placeholder="Cerca..." class="mb-6 p-2 bg-black border">
<div id="videos"></div>
</div>

<script>

const users = [
{u:"admin",p:"1234",n:"Admin"}
];

const videos = [
{title:"Video Test",url:"https://www.w3schools.com/html/mov_bbb.mp4"}
];

function login(){
const u = userInput.value;
const p = passwordInput.value;
const user = users.find(x=>x.u===u && x.p===p);
if(user){
localStorage.setItem("auth","1");
start();
}else alert("Errore");
}

function start(){
loginPage.classList.add("hidden");
app.classList.remove("hidden");
render();
}

function render(filter=""){
videos.innerHTML = videosData()
.filter(v=>v.title.toLowerCase().includes(filter.toLowerCase()))
.map(v=>`
<div class="video-card">
<video src="${v.url}" controls class="w-full"></video>
<div class="p-2 text-sm">${v.title}</div>
</div>
`).join("");
}

function videosData(){ return videos }

search.addEventListener("input",e=>render(e.target.value));

if(localStorage.getItem("auth")) start();

</script>

</body>
</html>
