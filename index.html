    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .video-row {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .video-row::-webkit-scrollbar { display: none; }

        .video-card { 
            flex: 0 0 280px; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 12px; 
            overflow: hidden;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .video-card:hover { 
                transform: translateY(-5px); 
                border-color: #3b82f6; 
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); 
            }
        }

        /* Header categoria con frecce sulla stessa linea */
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .category-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Pulsanti navigazione tondi accanto al titolo */
        .nav-controls {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            width: 34px;
            height: 34px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #a1a1aa;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .aspect-video { position: relative; width: 100%; aspect-ratio: 16 / 9; background: black; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .hero-gradient { background: linear-gradient(to bottom, transparent 20%, rgba(5,5,5,0.95) 100%); }
        .hidden { display: none !important; }
    </style>
</head>

        function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                localStorage.setItem('tribe_access', 'granted');
                showContent();
            } else { document.getElementById('errorMessage').classList.remove('hidden'); }
        }

        function showContent() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
        }

        function logout() { localStorage.removeItem('tribe_access'); location.reload(); }
        if (localStorage.getItem('tribe_access') === 'granted') showContent();

        function renderHero() {
            const container = document.getElementById('heroPlayerContainer');
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;
            const url = HERO_VIDEO.id.replace('dl=0', 'raw=1');
            container.innerHTML = `<video controls playsinline class="w-full h-full object-cover"><source src="${url}" type="video/mp4"></video>`;
        }

        window.scrollRow = function(id, direction) {
            const row = document.getElementById(id);
            const amount = 500;
            row.scrollBy({ left: direction * amount, behavior: 'smooth' });
        };

        function renderVideos(filter = "") {
            const container = document.getElementById('categoriesContainer');
            const hero = document.getElementById('heroSection');
            container.innerHTML = "";
            
            if (filter.trim() !== "") { hero.classList.add('hidden'); } 
            else { hero.classList.remove('hidden'); }

            categories.forEach((cat, idx) => {
                const filteredVideos = cat.videos.filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));
                if (filteredVideos.length > 0) {
                    const rowId = `row-${idx}`;
                    const section = document.createElement('div');
                    section.className = "mb-10";
                    
                    let cardsHtml = filteredVideos.map(v => `
                        <div class="video-card shadow-lg">
                            <div class="aspect-video">
                                <video controls preload="metadata" playsinline>
                                    <source src="${v.id.replace('dl=0', 'raw=1')}" type="video/mp4">
                                </video>
                            </div>
                            <div class="p-4">
                                <h3 class="font-bold text-xs text-zinc-100 line-clamp-2 h-8 uppercase">${v.title}</h3>
                                <p class="text-[8px] mt-2 text-blue-500 font-black tracking-widest uppercase">Academy Cloud</p>
                            </div>
                        </div>
                    `).join('');

                    section.innerHTML = `
                        <div class="category-header">
                            <h2 class="category-title">
                                <span class="w-1 h-4 bg-blue-600 rounded-full"></span> ${cat.name}
                            </h2>
                            <div class="nav-controls">
                                <button class="nav-btn" onclick="scrollRow('${rowId}', -1)"><i class="fas fa-chevron-left"></i></button>
                                <button class="nav-btn" onclick="scrollRow('${rowId}', 1)"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div id="${rowId}" class="video-row">${cardsHtml}</div>
                    `;
                    container.appendChild(section);
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        document.getElementById('passwordInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') checkPassword() });
