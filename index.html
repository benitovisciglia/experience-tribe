<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Tribe | Academy</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Slider video */
        .video-row {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 1.5rem;
            padding-bottom: 1rem;
            padding-top: 0.5rem;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        
        .video-row::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .video-card { 
            flex: 0 0 280px; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 12px; 
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (min-width: 768px) {
            .video-card:hover { 
                transform: translateY(-5px); 
                border-color: #3b82f6; 
                box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5);
            }
            .video-card { flex: 0 0 320px; }
        }
        
        .aspect-video {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: black;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        
        .hero-gradient { 
            background: linear-gradient(to bottom, transparent 0%, rgba(5,5,5,0.8) 50%, rgba(5,5,5,1) 100%); 
        }

        .hidden { display: none !important; }

        /* Stile pulsanti navigazione */
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #18181b;
            border: 1px solid #27272a;
            color: #71717a;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black text-white">
        <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-800 w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-black text-blue-500 mb-6 uppercase tracking-tighter">Experience Tribe</h1>
            <input type="password" id="passwordInput" autofocus placeholder="Password d'Accesso" 
                   class="w-full p-4 rounded-xl bg-black border border-zinc-700 text-white mb-4 text-center text-lg outline-none focus:border-blue-500">
            <button onclick="checkPassword()" class="w-full p-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all uppercase tracking-widest text-sm">Entra</button>
            <p id="errorMessage" class="text-red-500 text-xs mt-3 hidden">Password errata.</p>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="p-6 md:p-12 flex flex-col md:flex-row justify-between items-center gap-8 relative z-10">
            <a href="index.html" class="flex items-center gap-4 group transition-all">
                <img src="ET Monogram bianco.png" alt="Logo" class="w-10 h-10 md:w-16 md:h-16 object-contain">
                <div class="flex flex-col">
                    <h1 class="text-xl md:text-3xl font-black text-blue-500 tracking-tighter leading-none">EXPERIENCE TRIBE</h1>
                    <span class="text-zinc-500 text-[9px] md:text-xs uppercase tracking-[0.3em] font-bold">Training Academy</span>
                </div>
            </a>

            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500"></i>
                    <input type="text" id="searchInput" placeholder="Cerca formazione..." 
                           class="bg-zinc-900 border border-zinc-800 p-3 pl-11 pr-6 rounded-full w-full text-sm text-white outline-none focus:border-blue-500 transition-all">
                </div>
                <button onclick="logout()" class="flex items-center gap-2 text-zinc-600 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Esci</span>
                </button>
            </div>
        </header>

        <section id="heroSection" class="mb-10 md:mb-16 px-4">
            <div class="relative w-full max-w-6xl mx-auto overflow-hidden rounded-3xl border border-zinc-800 bg-black shadow-2xl">
                <div class="aspect-video">
                    <div id="heroPlayerContainer" class="w-full h-full"></div>
                </div>
                <div class="absolute bottom-0 left-0 w-full p-6 md:p-12 hero-gradient pointer-events-none">
                    <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider">In evidenza</span>
                    <h2 id="heroTitle" class="text-2xl md:text-4xl font-black mt-3 uppercase tracking-tighter text-white"></h2>
                    <p id="heroDesc" class="text-zinc-400 text-xs md:text-base mt-2 max-w-2xl italic opacity-80"></p>
                </div>
            </div>
        </section>

        <div id="categoriesContainer" class="px-6 md:px-12 pb-20"></div>
    </div>

    <script>
        const THE_PASSWORD = "ET2026IR";

        const HERO_VIDEO = {
            id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=cczcesmz&raw=1",
            title: "I 7 LADRI DEL TEMPO",
            desc: "Smetti di rincorrere le ore. Scopri i 7 errori invisibili che prosciugano la tua energia e impara il sistema definitivo per dominare la tua agenda.",
        };

        const categories = [
            { 
                name: "PRIMA FORMAZIONE NUOVO CONSULENTE", 
                videos: [
                    { id: "https://www.dropbox.com/scl/fi/a0lswxi350isedvhqvds5/ESEMPIO-CHIAMATA-per-appuntamento-consigli-vari.mp4?rlkey=5jy4isxa0enbpv8mqwei08m1q&st=nvskybgz&dl=0", title: "ESEMPIO CHIAMATA per appuntamento" },
                    { id: "https://www.dropbox.com/scl/fi/4fp5xqoyvnbv8j3is1t4s/I-PRIIMI-PASSI-FOLLOW-UP-CONSULENTE.mp4?rlkey=px2tsn949ee0z3m6tr80vjl9y&st=jqcjvfgi&dl=0", title: "I PRIMI PASSI FOLLOW UP" },
                    { id: "https://www.dropbox.com/scl/fi/0kmg63wtf8eax3n3sxbag/I-PRIMI-PASSI-BENVENUTO.mp4?rlkey=x9zf0f4w1yr436fvw4s7m7pzc&st=ldls1rp6&dl=0", title: "I PRIMI PASSI BENVENUTO" },
                    { id: "https://www.dropbox.com/scl/fi/pu07lqfkqoqxyhbeky6ou/PRIMA-FORMAZIONE-NUOVO-CONSULENTE.mp4?rlkey=9rxdp0i2h6umivr464zl3s2zi&st=5136ln4b&dl=0", title: "PRIMA FORMAZIONE" }
                ]
            },
            { 
                name: "FORMAZIONE 2026", 
                videos: [
                    { id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=7givwfa7&dl=0", title: "I 7 LADRI DEL TEMPO" },
                    { id: "https://www.dropbox.com/scl/fi/q4iyap1gnnj2bpsjm7ll0/END-OF-MONTH-CALL.mp4?rlkey=dzk5wrkm65kxflgecjwrfsvm9&st=siu4s76m&dl=0", title: "END OF MONTH CALL" },
                    { id: "https://www.dropbox.com/scl/fi/h4hgjbggp4lsa99husd2c/NOVITA-CHOGAN-MARZO-2026.mp4?rlkey=n5golm2h0ciu2j4s3uctok7wc&st=jevemisw&dl=0", title: "NOVITÀ CHOGAN MARZO 2026" }
                ]
            },
            { 
                name: "ATTIVARE IL CONSULENTE", 
                videos: [
                    { id: "https://www.dropbox.com/scl/fi/qzvthm70uq7j9wf87nrwt/ATTIVARE-IL-CONSULENTE.mp4?rlkey=48jxercszh19v1zr883wvyd88&st=1t8ve0co&dl=0", title: "ATTIVARE IL CONSULENTE" },
                    { id: "https://www.dropbox.com/scl/fi/zvbz9iyjvk5glbp1g59of/IL-CICLO-DI-VITA-DEL-CONSULENTE.mp4?rlkey=ovtutmyv7evndgh43akjtzzaj&st=nvplwbtw&dl=0", title: "IL CICLO DI VITA" }
                ] 
            }
            // Aggiungi qui le altre categorie...
        ];

        function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                localStorage.setItem('tribe_access', 'granted');
                showContent();
            } else { 
                document.getElementById('errorMessage').classList.remove('hidden'); 
            }
        }

        function showContent() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
            lucide.createIcons(); // Inizializza icone
        }

        function logout() { localStorage.removeItem('tribe_access'); location.reload(); }

        function renderHero() {
            const container = document.getElementById('heroPlayerContainer');
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;
            let url = HERO_VIDEO.id.replace('dl=0', 'raw=1');
            container.innerHTML = `<video controls playsinline class="w-full h-full object-cover"><source src="${url}" type="video/mp4"></video>`;
        }

        function renderVideos(filter = "") {
            const container = document.getElementById('categoriesContainer');
            const hero = document.getElementById('heroSection');
            const heroVideo = hero.querySelector('video');
            
            container.innerHTML = "";
            
            if (filter.trim() !== "") {
                hero.classList.add('hidden');
                if (heroVideo) heroVideo.pause();
            } else {
                hero.classList.remove('hidden');
            }

            categories.forEach((cat, index) => {
                const filteredVideos = cat.videos.filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));
                if (filteredVideos.length > 0) {
                    const rowId = `row-${index}`;
                    const section = document.createElement('div');
                    section.className = "mb-12";
                    
                    let videoCards = "";
                    filteredVideos.forEach(v => {
                        const videoUrl = v.id.replace('dl=0', 'raw=1');
                        videoCards += `
                            <div class="video-card shadow-lg">
                                <div class="aspect-video">
                                    <video controls preload="metadata" playsinline><source src="${videoUrl}" type="video/mp4"></video>
                                </div>
                                <div class="p-4">
                                    <h3 class="font-bold text-xs text-zinc-100 line-clamp-2 h-8">${v.title}</h3>
                                    <p class="text-[8px] mt-2 text-blue-500 font-black tracking-widest uppercase italic">Experience Tribe Academy</p>
                                </div>
                            </div>`;
                    });

                    section.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xs md:text-sm font-bold text-zinc-500 flex items-center gap-2 uppercase tracking-[0.2em]">
                                <span class="w-1 h-4 bg-blue-600 rounded-full"></span> ${cat.name}
                            </h2>
                            <div class="hidden md:flex gap-2">
                                <button onclick="document.getElementById('${rowId}').scrollBy({left: -400, behavior: 'smooth'})" class="nav-btn">
                                    <i data-lucide="chevron-left" class="w-4 h-4"></i>
                                </button>
                                <button onclick="document.getElementById('${rowId}').scrollBy({left: 400, behavior: 'smooth'})" class="nav-btn">
                                    <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div id="${rowId}" class="video-row">${videoCards}</div>`;
                    
                    container.appendChild(section);
                }
            });
            lucide.createIcons();
        }

        // Init
        if (localStorage.getItem('tribe_access') === 'granted') {
            showContent();
        } else {
            lucide.createIcons();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        document.getElementById('passwordInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') checkPassword() });
    </script>
</body>
</html>
