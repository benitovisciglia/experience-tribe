    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#3b82f6', // Il blu del tuo pulsante attuale
                            dark: '#050505',
                        }
                    },
                    backgroundImage: {
                        'login-pattern': "linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.95)), url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1920&auto=format&fit=crop')", // Immagine di team scura da Unsplash
                    }
                }
            }
        }

        // 1. Disabilita il tasto destro (Menu contestuale)
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        // 2. Disabilita le scorciatoie da tastiera comuni per lo sviluppo
        document.addEventListener('keydown', function(e) {
            // F12 (Ispeziona)
            if (e.key === "F12") {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Ispeziona) o Ctrl+Shift+J (Console) o Ctrl+U (Sorgente pagina)
            if (e.ctrlKey && (e.shiftKey && (e.key === 'I' || e.key === 'J') || e.key === 'U')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+S (Salva pagina)
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('keypress', function (e) {
            const loginPage = document.getElementById('loginPage');
            if (!loginPage.classList.contains('hidden') && e.key === 'Enter') {
                checkPassword();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const pwdInput = document.getElementById('passwordInput');
            if (pwdInput) {
                pwdInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        checkPassword();
                    }
                });
            }
        });

        window.onload = function() {
            if (localStorage.getItem('et_auth') === 'true') {
                loadApp();
            }
        };
        
    </script>

        function checkAccesso() {
            const userIn = document.getElementById('userInput').value.trim();
            const passIn = document.getElementById('passwordInput').value;
                
            // Cerca l'utente nel database
            const trovato = utentiAutorizzati.find(u => u.username === userIn && u.password === passIn);
            if (trovato) {
                localStorage.setItem('et_auth', 'true');
                localStorage.setItem('et_user_nome', trovato.nome); // Salviamo il nome reale (es: "Boss")
                loadApp();
            } else {
                alert("Credenziali non valide");
            }
        }


        function checkPassword() {
            const passInserita = document.getElementById('passwordInput').value;
            
            // Cerchiamo se la password esiste nel nostro database
            const utente = utentiAutorizzati.find(u => u.password === passInserita);
        
            if (utente) {
                localStorage.setItem('et_auth', 'true');
                localStorage.setItem('et_user_nome', utente.nome); // Salviamo il nome per l'header
                loadApp();
            } else {
                alert("Password Errata");
                document.getElementById('passwordInput').value = ""; // Pulisce il campo se sbagliata
            }
        }
        
        function loadApp() {
            // 1. Nascondi login e mostra contenuto
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        
            // 2. RECUPERA E MOSTRA IL NOME
            const nomeSalvato = localStorage.getItem('et_user_nome');
            const displayNome = document.getElementById('userNameDisplay');
            displayNome.innerText = "TEST FUNZIONA";
            
            if (displayNome) {
                if (nomeSalvato && nomeSalvato !== "undefined") {
                    displayNome.innerText = nomeSalvato.toUpperCase();
                } else {
                    displayNome.innerText = "OSPITE"; 
                }
            }
        
            // 3. Avvia i video (con il fix degli angoli che abbiamo fatto)
            renderHero();
            renderVideos();
        }

        function switchSection(type) {
            const videoSection = document.getElementById('videoSection');
            const catalogSection = document.getElementById('catalogSection');
            const btnV = document.getElementById('tabVideo');
            const btnC = document.getElementById('tabCataloghi');
            const heroVideo = document.querySelector('#heroPlayer video');
        
            if (type === 'video') {
                videoSection.classList.remove('hidden');
                catalogSection.classList.add('hidden');
                
                // Applichiamo solo classi di stile, NON di dimensione
                btnV.className = "rounded-full bg-blue-600 text-white font-bold text-[9px] uppercase transition-all";
                btnC.className = "rounded-full text-zinc-500 font-bold text-[9px] uppercase hover:text-white transition-all";
            } else {
                videoSection.classList.add('hidden');
                catalogSection.classList.remove('hidden');
                
                if (heroVideo) heroVideo.pause();
        
                // Applichiamo solo classi di stile, NON di dimensione
                btnC.className = "rounded-full bg-blue-600 text-white font-bold text-[9px] uppercase transition-all";
                btnV.className = "rounded-full text-zinc-500 font-bold text-[9px] uppercase hover:text-white transition-all";
                
                renderCatalogs();
            }
        }

        function renderHero() {
            // 1. Definiamo e puliamo i link prima di usarli
            const heroVideoUrl = HERO_VIDEO.id.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('dl=0', 'raw=1');
            
            // Puliamo anche il link della miniatura (poster)
            const heroPosterUrl = (HERO_VIDEO.poster || "").replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('dl=0', 'raw=1');
        
            // 2. Assegniamo i testi
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;
        
            // 3. Generiamo l'HTML usando le variabili "pulite" (heroVideoUrl e heroPosterUrl)
            document.getElementById('heroPlayer').innerHTML = `
                <video 
                    controls 
                    playsinline 
                    preload="metadata" 
                    class="w-full h-full object-cover" 
                    poster="${heroPosterUrl}">
                    <source src="${heroVideoUrl}#t=0.5" type="video/mp4">
                </video>
            `;
        }

        function filterVideos() {
            // 1. Prendiamo l'input di ricerca e il termine inserito
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            const term = searchInput.value.toLowerCase();
        
            // 2. Troviamo TUTTI i contenitori di video (le tue 'video-row')
            const rows = document.querySelectorAll('.video-row');
            const hero = document.getElementById('heroSection') || document.querySelector('.featured-video-container');
        
            // 3. Gestione visibilità Hero (il video grande in alto)
            if (hero) {
                hero.style.display = term.length > 0 ? 'none' : 'block';
            }
        
            // 4. Se stiamo cercando, assicuriamoci che la sezione Video sia visibile
            if (term.length > 0) {
                const videoSection = document.getElementById('videoSection');
                if (videoSection && videoSection.classList.contains('hidden')) {
                    // Se hai la funzione switchSection, la usiamo
                    if (typeof switchSection === "function") switchSection('video');
                }
            }
        
            // 5. Ciclo su tutte le card dei video
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                const titleElement = card.querySelector('h3');
                if (titleElement) {
                    const title = titleElement.innerText.toLowerCase();
                    // Mostra la card se il titolo contiene la ricerca, altrimenti nascondi
                    card.style.display = title.includes(term) ? "" : "none";
                }
            });
        
            // 6. Nascondi le righe (categorie) che rimangono vuote durante la ricerca
            rows.forEach(row => {
                const visibleCards = row.querySelectorAll('.video-card[style=""]');
                const header = row.previousElementSibling; // Il titolo della categoria
                if (term.length > 0 && visibleCards.length === 0) {
                    row.style.display = 'none';
                    if (header && header.classList.contains('category-header')) header.style.display = 'none';
                } else {
                    row.style.display = '';
                    if (header && header.classList.contains('category-header')) header.style.display = '';
                }
            });
        }
        

        function renderVideos(search = "") {
            const container = document.getElementById('categoriesContainer');
            const heroSection = document.getElementById('heroSection');
            container.innerHTML = "";
        
            // Gestione visibilità Hero
            if (search.trim().length > 0) {
                heroSection.classList.add('hidden');
                const heroVideo = heroSection.querySelector('video');
                if (heroVideo) heroVideo.pause();
            } else {
                const catalogSection = document.getElementById('catalogSection');
                if (catalogSection && catalogSection.classList.contains('hidden')) {
                    heroSection.classList.remove('hidden');
                }
            }
        
            categories.forEach((cat, idx) => {
                const filtered = cat.videos.filter(v => v.title.toLowerCase().includes(search.toLowerCase()));
                if (filtered.length === 0) return;
        
                const rowId = `row-${idx}`;
                const section = document.createElement('div');
                
                // Creiamo le card
               const videoCardsHTML = filtered.map(v => {
    // 1. IMPORTANTE: Usiamo v.id perché i tuoi link sono lì
    const originalUrl = v.id || v.url || ""; 
    
    // 2. Pulizia URL per Dropbox
    // Cambiamo www in dl.dropboxusercontent e forziamo raw=1
    let cleanUrl = originalUrl
        .replace('www.dropbox.com', 'dl.dropboxusercontent.com')
        .replace('dl=0', 'raw=1');
    
    // 3. Timestamp per l'anteprima (gestisce sia link con che senza parametri ?)
    const finalUrl = cleanUrl.includes('?') ? `${cleanUrl}&t=0.5` : `${cleanUrl}#t=0.5`;
    const posterImageUrl = v.poster || 'img/default-cover.png';

    return `
        <div class="video-card group">
            <div class="aspect-video bg-black relative overflow-hidden rounded-t-3xl">
                <video 
                    preload="metadata" 
                    playsinline 
                    webkit-playsinline
                    class="w-full h-full object-cover cursor-pointer" 
                    onclick="if(this.paused) { this.play(); this.controls=true; } else { this.pause(); }"
                    poster="${posterImageUrl}">
                    <source src="${finalUrl}" type="video/mp4">
                </video>
            </div>
            
            <div class="p-4 flex flex-col gap-3">
                <h3 class="text-[11px] font-bold uppercase text-zinc-100 line-clamp-2 leading-tight">${v.title}</h3>
                
                <div class="flex justify-between items-center pt-1 border-t border-zinc-800/50">
                    <div class="flex items-center gap-1.5">
                        <div class="w-1 h-1 bg-blue-500 rounded-full"></div>
                        <span class="text-[8px] text-zinc-500 uppercase tracking-[0.2em] font-medium">Academy</span>
                    </div>
                    <div class="text-zinc-600/80 group-hover:text-yellow-500 transition-colors duration-300">
                        <i class="fas fa-bolt text-[10px]"></i>
                    </div>
                </div>
            </div>
        </div>
    `;
}).join('');

        
        section.innerHTML = `
            <div class="category-header">
                <h2 class="category-title"><i class="fas fa-play text-blue-500 text-[8px]"></i> ${cat.name}</h2>
                <div class="nav-controls flex gap-2">
                    <button class="nav-btn" onclick="scrollRow('${rowId}', -1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="nav-btn" onclick="scrollRow('${rowId}', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="${rowId}" class="video-row">
                ${videoCardsHTML}
            </div>
        `;
        container.appendChild(section);
    });
}
