<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Tribe | Academy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Layout Righe Video */
        .video-row {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 1.5rem;
            padding: 1rem 0 2rem 0;
            scrollbar-width: none; 
        }
        .video-row::-webkit-scrollbar { display: none; }

        .video-card { 
            flex: 0 0 280px; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 12px; 
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .video-card:hover { 
            transform: translateY(-5px); 
            border-color: #3b82f6; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); 
        }

        /* Header Categoria con Frecce in stile App */
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
        }

        .category-title {
            font-size: 0.85rem;
            font-weight: 800;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-icon {
            color: #3b82f6;
            font-size: 0.7rem;
        }

        /* Navigazione Tonda accanto al titolo */
        .nav-controls {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        /* Input Ricerca con Icona */
        .search-container {
            position: relative;
            width: 100%;
        }
        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #52525b;
            font-size: 0.9rem;
        }
        .search-input {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            padding: 10px 15px 10px 40px;
            border-radius: 99px;
            font-size: 0.85rem;
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus { border-color: #3b82f6; background: #18181b; }

        .hero-gradient { background: linear-gradient(to bottom, transparent, rgba(5,5,5,1)); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-[100] flex items-center justify-center bg-black p-6">
        <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-800 w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-black text-blue-500 mb-8 uppercase tracking-tighter italic">Experience Tribe</h1>
            <input type="password" id="passwordInput" placeholder="Inserisci Password" class="w-full p-4 rounded-xl bg-black border border-zinc-700 text-white mb-4 text-center outline-none focus:border-blue-500">
            <button onclick="checkPassword()" class="w-full p-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all uppercase tracking-widest text-sm">Entra nell'Academy</button>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="p-6 md:p-12 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-4">
                <img src="ET Monogram bianco.png" alt="Logo" class="w-12 h-12 md:w-20 md:h-20 object-contain">
                <div>
                    <h1 class="text-2xl md:text-4xl font-black text-blue-500 tracking-tighter leading-none uppercase italic">EXPERIENCE TRIBE</h1>
                    <p class="text-zinc-500 text-[10px] md:text-xs uppercase tracking-[0.4em] font-bold mt-1">Training Academy</p>
                </div>
            </div>

            <div class="flex items-center gap-6 w-full md:w-auto">
                <div class="search-container md:w-64">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cerca un video..." class="search-input">
                </div>
                <button onclick="logout()" class="flex items-center gap-2 text-zinc-500 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">
                    <span>Esci</span>
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <section id="heroSection" class="px-6 md:px-12 mb-12">
            <div class="relative w-full max-w-6xl mx-auto rounded-3xl overflow-hidden border border-zinc-800 bg-black shadow-2xl">
                <div class="aspect-video">
                    <div id="heroPlayer" class="w-full h-full"></div>
                </div>
                <div class="absolute bottom-0 left-0 w-full p-6 md:p-12 hero-gradient pointer-events-none">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                        <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest">In Evidenza</span>
                    </div>
                    <h2 id="heroTitle" class="text-2xl md:text-4xl font-black uppercase tracking-tighter"></h2>
                    <p id="heroDesc" class="text-zinc-400 text-xs md:text-base mt-2 max-w-2xl italic"></p>
                </div>
            </div>
        </section>

        <div id="categoriesContainer" class="px-6 md:px-12 pb-20"></div>
    </div>

    <script>
        const THE_PASSWORD = "ET2026IR";

        const HERO_VIDEO = {
            id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=cczcesmz&raw=1",
            title: "I 7 LADRI DEL TEMPO",
            desc: "Scopri i sabotatori invisibili della tua produttività e impara a gestire il tuo tempo come un vero leader."
        };

        const categories = [
            { name: "PRIMA FORMAZIONE NUOVO CONSULENTE", videos: [
                { id: "https://www.dropbox.com/scl/fi/a0lswxi350isedvhqvds5/ESEMPIO-CHIAMATA-per-appuntamento-consigli-vari.mp4?rlkey=5jy4isxa0enbpv8mqwei08m1q&st=nvskybgz&dl=0", title: "ESEMPIO CHIAMATA per appuntamento" },
                { id: "https://www.dropbox.com/scl/fi/4fp5xqoyvnbv8j3is1t4s/I-PRIIMI-PASSI-FOLLOW-UP-CONSULENTE.mp4?rlkey=px2tsn949ee0z3m6tr80vjl9y&st=jqcjvfgi&dl=0", title: "I PRIMI PASSI FOLLOW UP CONSULENTE" },
                { id: "https://www.dropbox.com/scl/fi/0kmg63wtf8eax3n3sxbag/I-PRIMI-PASSI-BENVENUTO.mp4?rlkey=x9zf0f4w1yr436fvw4s7m7pzc&st=ldls1rp6&dl=0", title: "I PRIMI PASSI BENVENUTO" },
                { id: "https://www.dropbox.com/scl/fi/pu07lqfkqoqxyhbeky6ou/PRIMA-FORMAZIONE-NUOVO-CONSULENTE.mp4?rlkey=9rxdp0i2h6umivr464zl3s2zi&st=5136ln4b&dl=0", title: "PRIMA FORMAZIONE NUOVO CONSULENTE" }
            ]},
            { name: "FORMAZIONE 2026", videos: [
                { id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=7givwfa7&dl=0", title: "I 7 LADRI DEL TEMPO - COME AVERE PIU' TEMPO" },
                { id: "https://www.dropbox.com/scl/fi/h4hgjbggp4lsa99husd2c/NOVITA-CHOGAN-MARZO-2026.mp4?rlkey=n5golm2h0ciu2j4s3uctok7wc&st=jevemisw&dl=0", title: "NOVITA' CHOGAN MARZO 2026" },
                { id: "https://www.dropbox.com/scl/fi/080dq5char3anks58euex/STRATEGIE-DI-COMUNICAZIONE.mp4?rlkey=gzlq63bsu114qbah8hhfndj71&st=ef705fw4&dl=0", title: "STRATEGIE DI COMUNICAZIONE" }
            ]},
            { name: "FORMAZIONE SOCIAL", videos: [
                { id: "https://www.dropbox.com/scl/fi/n2xv3i9junwmna1o3qjr1/Sponsorizzare-sui-social.mp4?rlkey=v5gwcjv8t3l27ohh9rii77iv4&st=zmdnle4z&dl=0", title: "Sponsorizzare sui social" },
                { id: "https://www.dropbox.com/scl/fi/cgfw9pl8vzrd7c2azu7xj/Social-strategy-tik-tok-1-parte.mp4?rlkey=6e5h0acwjmbamarffryuk642h&st=v5au5iyf&dl=0", title: "SOCIAL STRATEGY TIKTOK - PARTE 1" }
            ]}
            // Aggiungi qui le altre tue categorie seguendo lo stesso schema...
        ];

        function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                localStorage.setItem('tribe_auth', 'true');
                loadApp();
            }
        }

        function loadApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
        }

        function logout() {
            localStorage.removeItem('tribe_auth');
            location.reload();
        }

        function renderHero() {
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;
            document.getElementById('heroPlayer').innerHTML = `
                <video controls playsinline class="w-full h-full object-cover">
                    <source src="${HERO_VIDEO.id}" type="video/mp4">
                </video>`;
        }

        window.scrollRow = (id, dir) => {
            const row = document.getElementById(id);
            row.scrollBy({ left: dir * 600, behavior: 'smooth' });
        };

        function renderVideos(search = "") {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = "";

            categories.forEach((cat, idx) => {
                const filtered = cat.videos.filter(v => v.title.toLowerCase().includes(search.toLowerCase()));
                if (filtered.length === 0) return;

                const rowId = `row-${idx}`;
                const section = document.createElement('div');
                
                let vcards = filtered.map(v => `
                    <div class="video-card">
                        <div class="aspect-video bg-black">
                            <video controls preload="metadata" playsinline class="w-full h-full object-cover">
                                <source src="${v.id.replace('dl=0', 'raw=1')}" type="video/mp4">
                            </video>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-[11px] text-zinc-100 uppercase line-clamp-2 h-8 leading-tight">${v.title}</h3>
                            <div class="mt-3 flex items-center justify-between">
                                <span class="text-[8px] text-blue-500 font-black tracking-widest uppercase">Academy Video</span>
                                <i class="fas fa-bolt text-blue-500 text-[8px]"></i>
                            </div>
                        </div>
                    </div>
                `).join('');

                section.innerHTML = `
                    <div class="category-header">
                        <h2 class="category-title">
                            <i class="fas fa-play play-icon"></i>
                            ${cat.name}
                        </h2>
                        <div class="nav-controls">
                            <button class="nav-btn" onclick="scrollRow('${rowId}', -1)"><i class="fas fa-chevron-left"></i></button>
                            <button class="nav-btn" onclick="scrollRow('${rowId}', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div id="${rowId}" class="video-row">${vcards}</div>
                `;
                container.appendChild(section);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        if (localStorage.getItem('tribe_auth') === 'true') loadApp();
    </script>
</body>
</html>
