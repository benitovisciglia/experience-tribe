<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Experience Tribe | Academy</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#050505">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <script src="data.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

    <div id="auth-container" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 w-full max-w-md text-center">
            <img src="ET Monogram bianco.png" class="w-20 h-20 mx-auto mb-6 opacity-50">
            <h2 class="text-2xl font-bold text-white mb-2">Area Riservata</h2>
            <p class="text-zinc-500 mb-6 text-sm">Inserisci la password per accedere all'Academy</p>
            <input type="password" id="password-input" class="w-full bg-black border border-zinc-700 text-white p-4 rounded-xl mb-4 focus:outline-none focus:border-blue-500 text-center" placeholder="Password">
            <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all">ENTRA</button>
            <p id="auth-error" class="text-red-500 text-sm mt-4 hidden">Password errata, riprova.</p>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="p-6 md:p-12 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
                <img src="ET Monogram bianco.png" alt="Logo" class="w-12 h-12 md:w-20 md:h-20 object-contain">
                <div>
                    <h1 class="text-2xl md:text-4xl font-black text-blue-500 tracking-tighter leading-none uppercase italic">EXPERIENCE TRIBE</h1>
                    <p class="text-zinc-500 text-[10px] md:text-xs uppercase tracking-[0.4em] font-bold mt-1">Training Academy</p>
                </div>
            </div>

            <div class="flex items-center gap-6 w-full md:w-auto">
                <div class="search-container md:w-64">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cerca un video..." class="search-input">
                </div>
                <button onclick="logout()" class="flex items-center gap-2 text-zinc-500 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">
                    <span>Esci</span>
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <section id="heroSection" class="px-6 md:px-12 mb-12">
            <div class="relative w-full max-w-6xl mx-auto rounded-3xl overflow-hidden border border-zinc-800 bg-black shadow-2xl">
                <div class="aspect-video">
                    <div id="heroPlayer" class="w-full h-full"></div>
                </div>
                <div class="absolute bottom-0 left-0 w-full p-6 md:p-12 hero-gradient pointer-events-none">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                        <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest">In Evidenza</span>
                    </div>
                    <h2 id="heroTitle" class="text-2xl md:text-4xl font-black uppercase tracking-tighter"></h2>
                    <p id="heroDesc" class="text-zinc-400 text-xs md:text-base mt-2 max-w-2xl italic"></p>
                </div>
            </div>
        </section>

        <div id="categoriesContainer" class="px-6 md:px-12 pb-20"></div>
    </div>
</body>
</html>
