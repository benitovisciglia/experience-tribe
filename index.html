<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Tribe | Academy</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .video-card { transition: all 0.3s ease; background: #111; border: 1px solid #222; border-radius: 16px; overflow: hidden; }
        .video-card:hover { transform: translateY(-5px); border-color: #f97316; }
        
        .video-container { border-radius: 16px 16px 0 0; overflow: hidden; position: relative; background: black; }
        .zoom-crop { transform: scale(1.15); transform-origin: bottom; width: 100%; height: 100%; }
        video { outline: none; width: 100%; height: 100%; background: black; }
        .hidden { display: none !important; }

        /* Stile speciale per il video in primo piano */
        .hero-gradient { background: linear-gradient(to bottom, transparent, #050505); }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black text-white">
        <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-800 w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-black text-orange-500 mb-6 uppercase tracking-tighter">Experience Tribe</h1>
            <input type="password" id="passwordInput" placeholder="Password d'Accesso" class="w-full p-4 rounded-xl bg-black border border-zinc-700 text-white mb-4 text-center text-lg outline-none focus:border-orange-500">
            <button onclick="checkPassword()" class="w-full p-4 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-xl transition-all uppercase tracking-widest text-sm">Entra</button>
            <p id="errorMessage" class="text-red-500 text-xs mt-3 hidden">Password errata.</p>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="p-6 md:p-12 flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
            <h1 class="text-3xl font-black text-orange-500 tracking-tighter leading-none">EXPERIENCE TRIBE<br><span class="text-zinc-500 text-xs uppercase tracking-[0.3em]">Training Academy</span></h1>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="Cerca formazione..." class="bg-zinc-900 border border-zinc-800 p-3 px-6 rounded-full w-full md:w-64 text-sm text-white outline-none focus:border-orange-500">
                <button onclick="logout()" class="text-zinc-500 hover:text-white text-xs font-bold uppercase">Esci</button>
            </div>
        </header>

        <section id="heroSection" class="px-6 md:px-12 mb-16">
            <div class="relative w-full max-w-6xl mx-auto rounded-3xl overflow-hidden border border-zinc-800 shadow-2xl bg-zinc-900">
                <div class="aspect-video w-full">
                    <div id="heroPlayerContainer" class="w-full h-full"></div>
                </div>
                <div class="absolute bottom-0 left-0 w-full p-8 hero-gradient pointer-events-none">
                    <span class="bg-orange-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-tighter">In Evidenza</span>
                    <h2 id="heroTitle" class="text-2xl md:text-4xl font-black mt-2 uppercase tracking-tighter">BENVENUTI NELLA TRIBE</h2>
                    <p id="heroDesc" class="text-zinc-400 text-sm md:text-base max-w-xl mt-2 italic">Inizia da qui il tuo percorso verso il successo.</p>
                </div>
            </div>
        </section>

        <div id="categoriesContainer" class="p-6 md:p-12 pt-0"></div>
    </div>

    <script>
        const THE_PASSWORD = "ET2026IR";

        // VIDEO IN PRIMO PIANO (Configuralo qui)
        const HERO_VIDEO = {
            id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=cczcesmz&dl=0", // Metti il link che preferisci
            title: "I 7 LADRI DEL TEMPO - COME AVERE PIU' TEMPO",
            desc: "Smetti di rincorrere le ore. Scopri i 7 errori invisibili che prosciugano la tua energia e impara il sistema definitivo per dominare la tua agenda invece di farti dominare."
        };
        
        const categories = [
            { name: "PRIMA FORMAZIONE NUOVO CONSULENTE", videos: [
                // ESEMPIO DROPBOX: Incolla qui il link di Dropbox (DL=0)
                { id: "https://www.dropbox.com/scl/fi/a0lswxi350isedvhqvds5/ESEMPIO-CHIAMATA-per-appuntamento-consigli-vari.mp4?rlkey=5jy4isxa0enbpv8mqwei08m1q&st=nvskybgz&dl=0", title: "ESEMPIO CHIAMATA per appuntamento" },
                { id: "https://www.dropbox.com/scl/fi/4fp5xqoyvnbv8j3is1t4s/I-PRIIMI-PASSI-FOLLOW-UP-CONSULENTE.mp4?rlkey=px2tsn949ee0z3m6tr80vjl9y&st=jqcjvfgi&dl=0", title: "I PRIMI PASSI FOLLOW UP CONSULENTE" },
                { id: "https://www.dropbox.com/scl/fi/0kmg63wtf8eax3n3sxbag/I-PRIMI-PASSI-BENVENUTO.mp4?rlkey=x9zf0f4w1yr436fvw4s7m7pzc&st=ldls1rp6&dl=0", title: "I PRIMI PASSI BENVENUTO" },
                { id: "https://www.dropbox.com/scl/fi/pu07lqfkqoqxyhbeky6ou/PRIMA-FORMAZIONE-NUOVO-CONSULENTE.mp4?rlkey=9rxdp0i2h6umivr464zl3s2zi&st=5136ln4b&dl=0", title: "PRIMA FORMAZIONE NUOVO CONSULENTE" }
            ]},
            { name: "90 DAYS RUN", videos: [
                { id: "https://www.dropbox.com/scl/fi/7r2mtsn8x7jepuwf829fc/90-DAYS-RUN-LA-CORSA-DEI-90-GIORNI.mp4?rlkey=znj2hr4a31dg1ykafv5l1p6xq&st=3vz7uccn&dl=0", title: "90 DAYS RUN LA CORSA DEI 90 GIORNI" },
                { id: "https://www.dropbox.com/scl/fi/itdtev5mdn0wuq8uzxbfn/PREP-KICK-OFF-MONACO.mp4?rlkey=cb58bxfzo6k8ylorgkrf781od&st=53ed14af&dl=0", title: "PREP KICK OFF MONACO" }
            ] },
            { name: "ATTIVARE IL CONSULENTE", videos: [
                { id: "https://www.dropbox.com/scl/fi/qzvthm70uq7j9wf87nrwt/ATTIVARE-IL-CONSULENTE.mp4?rlkey=48jxercszh19v1zr883wvyd88&st=1t8ve0co&dl=0", title: "ATTIVARE IL CONSULENTE" },
                { id: "https://www.dropbox.com/scl/fi/zvbz9iyjvk5glbp1g59of/IL-CICLO-DI-VITA-DEL-CONSULENTE.mp4?rlkey=ovtutmyv7evndgh43akjtzzaj&st=nvplwbtw&dl=0", title: "IL CICLO DI VITA DEL CONSULENTE" }
            ] },
            // ... le altre categorie restano vuote ma pronte
            { name: "04 - MINDSET E CRESCITA", videos: [] },
            { name: "05 - PIANO MARKETING", videos: [] },
            { name: "06 - GESTIONE TEAM", videos: [] },
            { name: "07 - DUPLICAZIONE", videos: [] },
            { name: "08 - EVENTI E ZOOM", videos: [] },
            { name: "09 - PRODOTTI FOCUS", videos: [] },
            { name: "10 - WORKSHOP PRATICO", videos: [] },
            { name: "11 - LEADERSHIP", videos: [] },
            { name: "12 - OBIETTIVI MENSILI", videos: [] },
            { name: "13 - SETTIMANA 1", videos: [] },
            { name: "14 - SETTIMANA 2", videos: [] },
            { name: "15 - SETTIMANA 3", videos: [] },
            { name: "16 - SETTIMANA 4", videos: [] },
            { name: "17 - STORYTELLING", videos: [] },
            { name: "18 - CHIUSURA CLIENTI", videos: [] },
            { name: "19 - FOLLOW UP AVANZATO", videos: [] },
            { name: "20 - RECLUTAMENTO", videos: [] },
            { name: "21 - PERSONAL BRANDING", videos: [] },
            { name: "22 - STRUMENTI DIGITALI", videos: [] },
            { name: "23 - CALL DI SQUADRA", videos: [] },
            { name: "24 - TESTIMONIANZE", videos: [] },
            { name: " Domande Frequenti", videos: [] },
            { name: "26 - ARCHIVIO 2024", videos: [] },
            { name: "27 - ARCHIVIO 2025", videos: [] },
            { name: "28 - LANCI SPECIALI", videos: [] },
            { name: "29 - BONUS TRACKS", videos: [] },
            { name: "30 - AREA ADMIN", videos: [] }
        ];

       function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                localStorage.setItem('tribe_access', 'granted');
                showContent();
            } else { document.getElementById('errorMessage').classList.remove('hidden'); }
        }

        function showContent() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
        }

        function logout() { localStorage.removeItem('tribe_access'); location.reload(); }
        if (localStorage.getItem('tribe_access') === 'granted') showContent();

        function renderHero() {
            const container = document.getElementById('heroPlayerContainer');
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;

            if (HERO_VIDEO.id.includes('dropbox.com')) {
                let url = HERO_VIDEO.id.replace('dl=0', 'raw=1');
                container.innerHTML = `<video controls class="w-full h-full object-cover"><source src="${url}" type="video/mp4"></video>`;
            } else if (HERO_VIDEO.id.includes('http')) {
                container.innerHTML = `<iframe class="zoom-crop" src="${HERO_VIDEO.id}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube-nocookie.com/embed/${HERO_VIDEO.id}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>`;
            }
        }

        function renderVideos(filter = "") {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = "";
            
            categories.forEach(cat => {
                const filteredVideos = cat.videos.filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));
                if (filteredVideos.length > 0) {
                    const section = document.createElement('div');
                    section.className = "mb-16";
                    let videoGridHTML = `<h2 class="text-xl font-bold text-zinc-400 mb-8 flex items-center gap-3">
                                            <span class="w-1 h-6 bg-orange-500 rounded-full"></span> ${cat.name}
                                         </h2>
                                         <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">`;
                    
                    filteredVideos.forEach(v => {
                        let content = "";
                        let lbl = "DIRECT STREAM";
                        if (v.id.includes('dropbox.com')) {
                            content = `<video controls disablePictureInPicture controlsList="nodownload" class="w-full h-full"><source src="${v.id.replace('dl=0', 'raw=1')}" type="video/mp4"></video>`;
                            lbl = "CLOUD STREAM";
                        } else if (v.id.includes('http')) {
                            content = `<iframe class="zoom-crop" src="${v.id}" frameborder="0" allowfullscreen scrolling="no"></iframe>`;
                        } else {
                            content = `<iframe class="w-full h-full" src="https://www.youtube-nocookie.com/embed/${v.id}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>`;
                            lbl = "YT ACADEMY";
                        }
                        videoGridHTML += `
                            <div class="video-card shadow-2xl">
                                <div class="video-container aspect-video">${content}</div>
                                <div class="p-5">
                                    <h3 class="font-bold text-sm text-zinc-100 leading-snug h-10 overflow-hidden">${v.title}</h3>
                                    <div class="mt-3 flex justify-between items-center text-[9px] font-black uppercase tracking-widest text-orange-500">
                                        <span>ACADEMY</span>
                                        <span class="text-zinc-600">${lbl}</span>
                                    </div>
                                </div>
                            </div>`;
                    });
                    videoGridHTML += `</div>`;
                    section.innerHTML = videoGridHTML;
                    container.appendChild(section);
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        document.getElementById('passwordInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPassword() });
    </script>
</body>
</html>
