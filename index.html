<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Experience Tribe | Academy</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; user-select: none; }
        .video-row { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 1.5rem; padding: 1rem 0 2rem 0; scrollbar-width: none; }
        .video-row::-webkit-scrollbar { display: none; }
        .video-card { flex: 0 0 280px; background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: all 0.3s ease; }
        .video-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; }
        .category-title { font-size: 0.85rem; font-weight: 800; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 10px; }
        .nav-btn { width: 36px; height: 36px; background: #18181b; border: 1px solid #27272a; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; transition: all 0.2s; }
        .nav-btn:hover { background: #3b82f6; border-color: #3b82f6; }
        .search-container { position: relative; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #52525b; font-size: 0.9rem; }
        .search-input { width: 100%; background: #111; border: 1px solid #222; padding: 10px 15px 10px 40px; border-radius: 99px; font-size: 0.85rem; color: white; outline: none; }
        .hero-gradient { background: linear-gradient(to bottom, transparent, rgba(5,5,5,1)); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-[110] flex items-center justify-center bg-black p-6">
        <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-800 w-full max-w-md text-center shadow-2xl">
            <h1 class="text-3xl font-black text-blue-500 mb-8 uppercase tracking-tighter italic">Experience Tribe</h1>
            <input type="password" id="passwordInput" placeholder="Password" class="w-full p-4 rounded-xl bg-black border border-zinc-700 text-white mb-4 text-center outline-none focus:border-blue-500">
            <button onclick="checkPassword()" class="w-full p-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl transition-all uppercase tracking-widest text-sm">Entra</button>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        
        <header class="p-6 md:p-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
                <img src="ET Monogram bianco.png" alt="Logo" class="w-12 h-12 md:w-16 md:h-16 object-contain">
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-blue-500 tracking-tighter leading-none uppercase italic">EXPERIENCE TRIBE</h1>
                    <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] font-bold mt-1 text-center md:text-left">Academy</p>
                </div>
            </div>

            <div class="flex items-center bg-zinc-900/50 border border-zinc-800 p-1.5 rounded-2xl">
                <button id="tabVideo" onclick="switchSection('video')" class="px-6 py-2 rounded-xl bg-blue-600 text-white font-bold text-[10px] uppercase tracking-widest transition-all">VIDEO</button>
                <button id="tabCataloghi" onclick="switchSection('cataloghi')" class="px-6 py-2 rounded-xl text-zinc-500 font-bold text-[10px] uppercase tracking-widest transition-all hover:text-white">CATALOGHI</button>
            </div>

            <div class="flex items-center gap-4">
                <div class="search-container w-48">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cerca..." class="search-input">
                </div>
                <button onclick="logout()" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div id="videoSection">
            <section id="heroSection" class="px-6 md:px-12 mb-12">
                <div class="relative w-full max-w-6xl mx-auto rounded-3xl overflow-hidden border border-zinc-800 bg-black shadow-2xl">
                    <div class="aspect-video" id="heroPlayer"></div>
                    <div class="absolute bottom-0 left-0 w-full p-8 hero-gradient pointer-events-none">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                            <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest">In Evidenza</span>
                        </div>
                        <h2 id="heroTitle" class="text-2xl md:text-3xl font-black uppercase tracking-tighter"></h2>
                        <p id="heroDesc" class="text-zinc-400 text-xs mt-2 max-w-2xl italic"></p>
                    </div>
                </div>
            </section>
            <div id="categoriesContainer" class="px-6 md:px-12 pb-20"></div>
        </div>

        <div id="catalogSection" class="hidden px-6 md:px-12 max-w-6xl mx-auto pb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="catalogGrid"></div>
        </div>
    </div>

    <script>
        const THE_PASSWORD = "ET2026IR";
        
        const HERO_VIDEO = {
            id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&raw=1",
            title: "I 7 LADRI DEL TEMPO",
            desc: "Scopri i sabotatori invisibili della tua produttività."
        };

        const categories = [
            { name: "PRIMA FORMAZIONE NUOVO CONSULENTE", videos: [
                { id: "https://www.dropbox.com/scl/fi/0kmg63wtf8eax3n3sxbag/I-PRIMI-PASSI-BENVENUTO.mp4?rlkey=x9zf0f4w1yr436fvw4s7m7pzc&raw=1", title: "Benvenuto nell'Academy" },
                { id: "https://www.dropbox.com/scl/fi/4fp5xqoyvnbv8j3is1t4s/I-PRIIMI-PASSI-FOLLOW-UP-CONSULENTE.mp4?rlkey=px2tsn949ee0z3m6tr80vjl9y&raw=1", title: "Follow Up Consulente" }
            ]},
            { name: "FORMAZIONE DI BASE", videos: [
                { id: "https://www.dropbox.com/scl/fi/0pbktidktqcgyg4a72p78/I-PRIMI-PASSI.mp4?rlkey=56trbs2davw5160ujbo7dnlwa&raw=1", title: "I Primi Passi" }
            ]}
        ];

        const catalogs = [
            { title: "Manuale Operativo 2026", icon: "📚", link: "#", desc: "La guida completa al metodo" },
            { title: "Piano Compensi", icon: "💰", link: "#", desc: "Tutte le provvigioni" },
            { title: "Catalogo Prodotti", icon: "🛍️", link: "#", desc: "Sfoglia la gamma completa" }
        ];

        function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                localStorage.setItem('et_auth', 'true');
                loadApp();
            } else { alert("Password Errata"); }
        }

        function loadApp() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
        }

        function switchSection(type) {
            const vSec = document.getElementById('videoSection');
            const cSec = document.getElementById('catalogSection');
            const btnV = document.getElementById('tabVideo');
            const btnC = document.getElementById('tabCataloghi');
            const heroVideo = document.querySelector('#heroPlayer video');

            if (type === 'video') {
                vSec.classList.remove('hidden');
                cSec.classList.add('hidden');
                btnV.className = "px-6 py-2 rounded-xl bg-blue-600 text-white font-bold text-[10px] uppercase tracking-widest";
                btnC.className = "px-6 py-2 rounded-xl text-zinc-500 font-bold text-[10px] uppercase tracking-widest hover:text-white";
            } else {
                vSec.classList.add('hidden');
                cSec.classList.remove('hidden');
                if (heroVideo) heroVideo.pause();
                btnC.className = "px-6 py-2 rounded-xl bg-blue-600 text-white font-bold text-[10px] uppercase tracking-widest";
                btnV.className = "px-6 py-2 rounded-xl text-zinc-500 font-bold text-[10px] uppercase tracking-widest hover:text-white";
                renderCatalogs();
            }
        }

        function renderHero() {
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;
            document.getElementById('heroPlayer').innerHTML = `<video controls playsinline class="w-full h-full object-cover"><source src="${HERO_VIDEO.id}" type="video/mp4"></video>`;
        }

        function renderVideos(search = "") {
            const container = document.getElementById('categoriesContainer');
            const heroSection = document.getElementById('heroSection'); // Puntiamo all'Hero
            container.innerHTML = "";
        
            // LOGICA ANTI-INGOMBRO: Se scrivo qualcosa, nascondo l'Hero
            if (search.trim().length > 0) {
                heroSection.classList.add('hidden');
                const heroVideo = heroSection.querySelector('video');
                if (heroVideo) heroVideo.pause(); // Stoppa l'audio se cerchi
            } else {
                // Se la barra è vuota e siamo nella sezione video, lo mostriamo
                const catalogSection = document.getElementById('catalogSection');
                if (catalogSection.classList.contains('hidden')) {
                    heroSection.classList.remove('hidden');
                }
            }
        
            categories.forEach((cat, idx) => {
                const filtered = cat.videos.filter(v => v.title.toLowerCase().includes(search.toLowerCase()));
                if (filtered.length === 0) return;
        
                const rowId = `row-${idx}`;
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="category-header">
                        <h2 class="category-title"><i class="fas fa-play text-blue-500 text-[8px]"></i> ${cat.name}</h2>
                        <div class="nav-controls flex gap-2">
                            <button class="nav-btn" onclick="scrollRow('${rowId}', -1)"><i class="fas fa-chevron-left"></i></button>
                            <button class="nav-btn" onclick="scrollRow('${rowId}', 1)"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div id="${rowId}" class="video-row">${filtered.map(v => `
                        <div class="video-card">
                            <div class="aspect-video bg-black">
                                <video preload="metadata" playsinline class="w-full h-full object-cover" 
                                       onclick="this.play(); this.controls=true"
                                       poster="favicon.png">
                                    <source src="${v.id.includes('raw=1') ? v.id : v.id.replace('dl=0', 'raw=1')}#t=0.5" type="video/mp4">
                                </video>
                            </div>
                            <div class="p-4"><h3 class="text-[10px] font-bold uppercase text-zinc-100">${v.title}</h3></div>
                        </div>
                    `).join('')}</div>
                `;
                container.appendChild(section);
            });
        }

        function renderCatalogs() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = catalogs.map(c => `
                <a href="${c.link}" target="_blank" class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 flex flex-col items-center text-center hover:border-blue-500 transition-all">
                    <div class="text-4xl mb-4">${c.icon}</div>
                    <h3 class="font-bold text-sm uppercase">${c.title}</h3>
                    <p class="text-zinc-500 text-[10px] mt-2">${c.desc}</p>
                </a>
            `).join('');
        }

        window.scrollRow = (id, dir) => {
            const row = document.getElementById(id);
            row.scrollBy({ left: dir * 300, behavior: 'smooth' });
        };

        function logout() { localStorage.removeItem('et_auth'); location.reload(); }
        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        if (localStorage.getItem('et_auth') === 'true') loadApp();
    </script>
</body>
</html>
