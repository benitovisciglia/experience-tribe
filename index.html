<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        
        /* Contenitore dello slider */
        .video-row {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            padding-top: 0.5rem;
            /* Nasconde la scrollbar su Firefox e IE */
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        
        /* Nasconde la scrollbar su Chrome, Safari e Opera */
        .video-row::-webkit-scrollbar {
            display: none;
        }

        /* Card del video adattata allo slider */
        .video-card { 
            flex: 0 0 300px; /* Ogni card ha una larghezza fissa di 300px */
            transition: all 0.3s ease; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 16px; 
            overflow: hidden; 
        }
        
        .video-card:hover { transform: translateY(-5px); border-color: #f97316; }
        
        .video-container { border-radius: 16px 16px 0 0; overflow: hidden; position: relative; background: black; }
        .zoom-crop { transform: scale(1.15); transform-origin: bottom; width: 100%; height: 100%; }
        
        video { outline: none; width: 100%; height: 100%; background: black; object-fit: cover; }
        
        .hidden { display: none !important; }

        /* Stile speciale per il video in primo piano */
        .hero-gradient { background: linear-gradient(to bottom, transparent, #050505); }

        /* Bottoni delle frecce (opzionale: un piccolo effetto al passaggio) */
        .nav-btn {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(4px);
        }
        .nav-btn:hover {
            background: #f97316;
            color: white;
        }
    </style>

       function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                localStorage.setItem('tribe_access', 'granted');
                showContent();
            } else { document.getElementById('errorMessage').classList.remove('hidden'); }
        }

        function showContent() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            renderHero();
            renderVideos();
        }

        function logout() { localStorage.removeItem('tribe_access'); location.reload(); }
        if (localStorage.getItem('tribe_access') === 'granted') showContent();

        function renderHero() {
            const container = document.getElementById('heroPlayerContainer');
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;

            if (HERO_VIDEO.id.includes('dropbox.com')) {
                let url = HERO_VIDEO.id.replace('dl=0', 'raw=1');
                container.innerHTML = `<video controls class="w-full h-full object-cover"><source src="${url}" type="video/mp4"></video>`;
            } else if (HERO_VIDEO.id.includes('http')) {
                container.innerHTML = `<iframe class="zoom-crop" src="${HERO_VIDEO.id}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube-nocookie.com/embed/${HERO_VIDEO.id}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>`;
            }
        }

        // Funzione per far scorrere lo slider
        function scrollRow(id, distance) {
            const row = document.getElementById(id);
            row.scrollBy({ left: distance, behavior: 'smooth' });
        }

        function renderVideos(filter = "") {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = "";
            
            categories.forEach((cat, index) => {
                const filteredVideos = cat.videos.filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));
                
                if (filteredVideos.length > 0) {
                    const section = document.createElement('div');
                    section.className = "mb-16 relative";
                    
                    // ID unico per ogni riga per permettere lo scorrimento
                    const rowId = `row-${index}`;
                    
                    let videoGridHTML = `
                        <div class="flex justify-between items-end mb-6">
                            <h2 class="text-xl font-bold text-zinc-400 flex items-center gap-3">
                                <span class="w-1 h-6 bg-orange-500 rounded-full"></span> ${cat.name}
                            </h2>
                            <div class="flex gap-2">
                                <button onclick="scrollRow('${rowId}', -320)" class="nav-btn p-2 rounded-full border border-zinc-800 text-zinc-400 transition-all hover:text-white">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                                </button>
                                <button onclick="scrollRow('${rowId}', 320)" class="nav-btn p-2 rounded-full border border-zinc-800 text-zinc-400 transition-all hover:text-white">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                </button>
                            </div>
                        </div>
                        
                        <div id="${rowId}" class="video-row">`;
                    
                    filteredVideos.forEach(v => {
                        let content = "";
                        let lbl = "DIRECT STREAM";
                        
                        if (v.id.includes('dropbox.com')) {
                            // Inserito preload="metadata" e poster per le miniature
                            content = `<video controls preload="metadata" poster="${v.poster || ''}" disablePictureInPicture controlsList="nodownload" class="w-full h-full">
                                          <source src="${v.id.replace('dl=0', 'raw=1')}" type="video/mp4">
                                       </video>`;
                            lbl = "CLOUD STREAM";
                        } else if (v.id.includes('http')) {
                            content = `<iframe class="zoom-crop" src="${v.id}" frameborder="0" allowfullscreen scrolling="no"></iframe>`;
                        } else {
                            content = `<iframe class="w-full h-full" src="https://www.youtube-nocookie.com/embed/${v.id}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>`;
                            lbl = "YT ACADEMY";
                        }
                        
                        videoGridHTML += `
                            <div class="video-card shadow-2xl">
                                <div class="video-container aspect-video">${content}</div>
                                <div class="p-5">
                                    <h3 class="font-bold text-sm text-zinc-100 leading-snug h-10 overflow-hidden">${v.title}</h3>
                                    <div class="mt-3 flex justify-between items-center text-[9px] font-black uppercase tracking-widest text-orange-500">
                                        <span>ACADEMY</span>
                                        <span class="text-zinc-600">${lbl}</span>
                                    </div>
                                </div>
                            </div>`;
                    });
                    
                    videoGridHTML += `</div>`;
                    section.innerHTML = videoGridHTML;
                    container.appendChild(section);
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        document.getElementById('passwordInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPassword() });
    </script>
</body>
</html>
