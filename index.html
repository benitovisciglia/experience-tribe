<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Tribe | Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .video-row {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 1.5rem;
            padding: 1rem 0;
            scrollbar-width: none; 
        }
        .video-row::-webkit-scrollbar { display: none; }

        .video-card { 
            flex: 0 0 280px; 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 12px; 
            transition: all 0.3s ease;
        }

        /* Container della riga per posizionare le frecce */
        .category-container { position: relative; }

        /* Stile Frecce */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            opacity: 0; /* Nascoste di default */
        }

        /* Mostra le frecce quando passi sopra la categoria (solo desktop) */
        .category-container:hover .nav-arrow { opacity: 1; }
        .nav-arrow:hover { background: #3b82f6; border-color: #3b82f6; transform: translateY(-50%) scale(1.1); }

        .arrow-left { left: -20px; }
        .arrow-right { right: -20px; }

        @media (max-width: 768px) {
            .nav-arrow { display: none; } /* Su mobile si usa lo swipe naturale */
            .video-card { flex: 0 0 250px; }
        }

        .hero-gradient { background: linear-gradient(to bottom, transparent, rgba(5,5,5,1)); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 z-50 flex items-center justify-center bg-black">
        <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 w-80 text-center">
            <input type="password" id="passwordInput" placeholder="Password" class="w-full p-3 rounded bg-black border border-zinc-700 mb-4 text-center text-white">
            <button onclick="checkPassword()" class="w-full p-3 bg-blue-600 font-bold rounded">ENTRA</button>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="p-6 md:p-12 flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-500 tracking-tighter">EXPERIENCE TRIBE</h1>
            <input type="text" id="searchInput" placeholder="Cerca..." class="bg-zinc-900 border border-zinc-800 p-2 px-4 rounded-full text-sm outline-none focus:border-blue-500">
        </header>

        <div id="categoriesContainer" class="p-6 md:p-12"></div>
    </div>

    <script>
        const THE_PASSWORD = "ET2026IR";
        
        // Dati abbreviati per l'esempio (usa i tuoi link completi qui)
        const categories = [
            { 
                name: "PRIMA FORMAZIONE NUOVO CONSULENTE", 
                videos: [
                    { id: "https://www.dropbox.com/scl/fi/a0lswxi350isedvhqvds5/ESEMPIO-CHIAMATA-per-appuntamento-consigli-vari.mp4?rlkey=5jy4isxa0enbpv8mqwei08m1q&st=nvskybgz&dl=0", title: "ESEMPIO CHIAMATA" },
                    { id: "https://www.dropbox.com/scl/fi/4fp5xqoyvnbv8j3is1t4s/I-PRIIMI-PASSI-FOLLOW-UP-CONSULENTE.mp4?rlkey=px2tsn949ee0z3m6tr80vjl9y&st=jqcjvfgi&dl=0", title: "I PRIMI PASSI" },
                    { id: "https://www.dropbox.com/scl/fi/0kmg63wtf8eax3n3sxbag/I-PRIMI-PASSI-BENVENUTO.mp4?rlkey=x9zf0f4w1yr436fvw4s7m7pzc&st=ldls1rp6&dl=0", title: "BENVENUTO" },
                    { id: "https://www.dropbox.com/scl/fi/pu07lqfkqoqxyhbeky6ou/PRIMA-FORMAZIONE-NUOVO-CONSULENTE.mp4?rlkey=9rxdp0i2h6umivr464zl3s2zi&st=5136ln4b&dl=0", title: "FORMAZIONE" },
                    { id: "https://www.dropbox.com/scl/fi/7r2mtsn8x7jepuwf829fc/90-DAYS-RUN-LA-CORSA-DEI-90-GIORNI.mp4?rlkey=znj2hr4a31dg1ykafv5l1p6xq&st=3vz7uccn&dl=0", title: "90 DAYS RUN" }
                ]
            },
            {
                name: "FORMAZIONE 2026",
                videos: [
                    { id: "https://www.dropbox.com/scl/fi/jiyhdv1vccdtt91jhayeh/I-7-LADRI-DEL-TEMPO-COME-AVERE-PIU-TEMPO.mp4?rlkey=f54pge4noisyqir5jj5u561nk&st=7givwfa7&dl=0", title: "I 7 LADRI DEL TEMPO" },
                    { id: "https://www.dropbox.com/scl/fi/q4iyap1gnnj2bpsjm7ll0/END-OF-MONTH-CALL.mp4?rlkey=dzk5wrkm65kxflgecjwrfsvm9&st=siu4s76m&dl=0", title: "END OF MONTH" }
                ]
            }
        ];

        function checkPassword() {
            if (document.getElementById('passwordInput').value === THE_PASSWORD) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                renderVideos();
            }
        }

        // Funzione per scorrere la riga
        window.scrollRow = function(id, direction) {
            const row = document.getElementById(id);
            const scrollAmount = 600; 
            row.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
        };

        function renderVideos(filter = "") {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = "";

            categories.forEach((cat, idx) => {
                const filtered = cat.videos.filter(v => v.title.toLowerCase().includes(filter.toLowerCase()));
                if (filtered.length === 0) return;

                const rowId = `row-${idx}`;
                const section = document.createElement('div');
                section.className = "mb-16 category-container";

                let cardsHtml = filtered.map(v => `
                    <div class="video-card overflow-hidden">
                        <div class="aspect-video bg-black">
                            <video controls class="w-full h-full object-cover">
                                <source src="${v.id.replace('dl=0', 'raw=1')}" type="video/mp4">
                            </video>
                        </div>
                        <div class="p-4 text-xs font-bold">${v.title}</div>
                    </div>
                `).join('');

                section.innerHTML = `
                    <h2 class="text-sm font-bold text-zinc-500 mb-4 uppercase tracking-widest">${cat.name}</h2>
                    
                    <div class="nav-arrow arrow-left" onclick="scrollRow('${rowId}', -1)">
                        <i class="fas fa-chevron-left"></i>
                    </div>
                    <div class="nav-arrow arrow-right" onclick="scrollRow('${rowId}', 1)">
                        <i class="fas fa-chevron-right"></i>
                    </div>

                    <div id="${rowId}" class="video-row">
                        ${cardsHtml}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
    </script>
</body>
</html>
