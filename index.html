<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Experience Tribe | Academy</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                brand: {
                    blue: '#3b82f6',
                    dark: '#050505'
                }
            },
            backgroundImage: {
                'login-pattern': "linear-gradient(to bottom, rgba(5,5,5,0.8), rgba(5,5,5,0.95)), url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1920&auto=format&fit=crop')"
            }
        }
    }
};

document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', function(e) {
    if (e.key === "F12") {
        e.preventDefault();
        return false;
    }

    if (
        e.ctrlKey &&
        (
            (e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
            e.key === 'U'
        )
    ) {
        e.preventDefault();
        return false;
    }

    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        return false;
    }
});

window.onload = function() {
    if (localStorage.getItem('et_auth') === 'true') {
        loadApp();
    }
};
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body {
    background-color: #050505;
    color: white;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

.video-row {
    display: flex;
    overflow-x: auto;
    gap: 1.5rem;
    padding: 1rem 0 2rem 0;
    scrollbar-width: none;
}

.video-row::-webkit-scrollbar { display: none; }

.video-card {
    flex: 0 0 280px;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
}

.video-card:hover {
    transform: translateY(-5px);
    border-color: #3b82f6;
    box-shadow: 0 0 20px rgba(59,130,246,0.3);
}

.glass {
    background: rgba(17,17,17,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
}

/* FIX CSS MOBILE */
@media (max-width: 767px) {

    header { flex-wrap: wrap !important; }

    #headerSearchContainer {
        width: 100% !important;
        order: 3;
        margin-top: 12px;
        display: flex !important;
        justify-content: center !important;
    }

    footer {
        padding-bottom: 40px;
    }

    h1 { font-size: 15px !important; }
}
</style>
</head>

<body class="bg-black min-h-screen">

<!-- LOGIN -->
<div id="loginPage" class="fixed inset-0 flex items-center justify-center">
    <div class="glass p-8 rounded-3xl w-full max-w-md text-center">
        <h1 class="text-3xl font-black text-blue-500">Experience Tribe</h1>

        <input id="userInput" placeholder="Username" class="w-full mt-4 p-3 bg-black border rounded">
        <input id="passwordInput" type="password" placeholder="Password" class="w-full mt-2 p-3 bg-black border rounded">

        <button onclick="checkAccesso()" class="w-full mt-4 p-3 bg-blue-600 rounded">
            Entra
        </button>
    </div>
</div>

<!-- APP -->
<div id="mainContent" class="hidden">
<header class="p-4 flex justify-between border-b border-zinc-900">
    <h1 class="text-blue-500 font-black">EXPERIENCE TRIBE</h1>
    <button onclick="logout()">Logout</button>
</header>

<div id="videoSection" class="p-6">
    <div id="heroPlayer"></div>
    <div id="categoriesContainer"></div>
</div>
</div>

<script>
const utentiAutorizzati = [
    { username: "ospite", password: "ETQUEST26", nome: "OSPITE" }
];

function checkAccesso() {
    const u = userInput.value.trim();
    const p = passwordInput.value;

    const trovato = utentiAutorizzati.find(x => x.username === u && x.password === p);

    if (trovato) {
        localStorage.setItem('et_auth', 'true');
        localStorage.setItem('et_user_nome', trovato.nome);
        loadApp();
    } else {
        alert("Credenziali non valide");
    }
}

function loadApp() {
    loginPage.classList.add('hidden');
    mainContent.classList.remove('hidden');

    renderHero();
}

function renderHero() {
    heroPlayer.innerHTML = `
        <video controls playsinline webkit-playsinline class="w-full">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    `;
}

function logout() {
    localStorage.removeItem('et_auth');
    location.reload();
}
</script>

</body>
</html>
