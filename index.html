    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#3b82f6', // Il blu del tuo pulsante attuale
                            dark: '#050505',
                        }
                    },
                    backgroundImage: {
                        'login-pattern': "linear-gradient(to bottom, rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.95)), url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1920&auto=format&fit=crop')", // Immagine di team scura da Unsplash
                    }
                }
            }
        }

        // 1. Disabilita il tasto destro (Menu contestuale)
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        // 2. Disabilita le scorciatoie da tastiera comuni per lo sviluppo
        document.addEventListener('keydown', function(e) {
            // F12 (Ispeziona)
            if (e.key === "F12") {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Ispeziona) o Ctrl+Shift+J (Console) o Ctrl+U (Sorgente pagina)
            if (e.ctrlKey && (e.shiftKey && (e.key === 'I' || e.key === 'J') || e.key === 'U')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+S (Salva pagina)
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('keypress', function (e) {
            const loginPage = document.getElementById('loginPage');
            if (!loginPage.classList.contains('hidden') && e.key === 'Enter') {
                checkPassword();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const pwdInput = document.getElementById('passwordInput');
            if (pwdInput) {
                pwdInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        checkPassword();
                    }
                });
            }
        });

        window.onload = function() {
            if (localStorage.getItem('et_auth') === 'true') {
                loadApp();
            }
        };
        
    </script>

        function checkAccesso() {
            const userIn = document.getElementById('userInput').value.trim();
            const passIn = document.getElementById('passwordInput').value;
                
            // Cerca l'utente nel database
            const trovato = utentiAutorizzati.find(u => u.username === userIn && u.password === passIn);
            alert("Login ok! Nome salvato: " + trovato.nome);
            if (trovato) {
                localStorage.setItem('et_auth', 'true');
                localStorage.setItem('et_user_nome', trovato.nome); // Salviamo il nome reale (es: "Boss")
                loadApp();
            } else {
                alert("Credenziali non valide");
            }
        }


        function checkPassword() {
            const passInserita = document.getElementById('passwordInput').value;
            
            // Cerchiamo se la password esiste nel nostro database
            const utente = utentiAutorizzati.find(u => u.password === passInserita);
        
            if (utente) {
                localStorage.setItem('et_auth', 'true');
                localStorage.setItem('et_user_nome', utente.nome); // Salviamo il nome per l'header
                loadApp();
            } else {
                alert("Password Errata");
                document.getElementById('passwordInput').value = ""; // Pulisce il campo se sbagliata
            }
        }
        
        function loadApp() {
            // 1. Nascondi login e mostra contenuto
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        
            // 2. RECUPERA E MOSTRA IL NOME
            const nomeSalvato = localStorage.getItem('et_user_nome');
            const displayNome = document.getElementById('userNameDisplay');
            displayNome.innerText = "TEST FUNZIONA";
            
            if (displayNome) {
                if (nomeSalvato && nomeSalvato !== "undefined") {
                    displayNome.innerText = nomeSalvato.toUpperCase();
                } else {
                    displayNome.innerText = "OSPITE"; 
                }
            }
        
            // 3. Avvia i video (con il fix degli angoli che abbiamo fatto)
            renderHero();
            renderVideos();
        }

        function switchSection(type) {
            const videoSection = document.getElementById('videoSection'); // Il contenitore che include l'Hero
            const catalogSection = document.getElementById('catalogSection');
            const btnV = document.getElementById('tabVideo');
            const btnC = document.getElementById('tabCataloghi');
            const heroVideo = document.querySelector('#heroPlayer video');
        
            if (type === 'video') {
                videoSection.classList.remove('hidden');
                catalogSection.classList.add('hidden');
                
                // Stile bottoni header
                btnV.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full bg-blue-600 text-white font-bold text-[10px] uppercase tracking-widest";
                btnC.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full text-zinc-500 font-bold text-[10px] uppercase tracking-widest hover:text-white";
            } else {
                // Nascondiamo TUTTA la sezione video (Hero incluso)
                videoSection.classList.add('hidden');
                catalogSection.classList.remove('hidden');
                
                // Stoppiamo il video se sta andando
                if (heroVideo) heroVideo.pause();
        
                // Stile bottoni header
                btnC.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full bg-blue-600 text-white font-bold text-[10px] uppercase tracking-widest";
                btnV.className = "flex-1 md:flex-none px-8 py-2.5 rounded-full text-zinc-500 font-bold text-[10px] uppercase tracking-widest hover:text-white";
                
                renderCatalogs();
            }
        }

        function renderHero() {
            document.getElementById('heroTitle').innerText = HERO_VIDEO.title;
            document.getElementById('heroDesc').innerText = HERO_VIDEO.desc;
            document.getElementById('heroPlayer').innerHTML = `<video controls playsinline class="w-full h-full object-cover"><source src="${HERO_VIDEO.id}" type="video/mp4"></video>`;
        }

function renderVideos(search = "") {
    const container = document.getElementById('categoriesContainer');
    const heroSection = document.getElementById('heroSection');
    container.innerHTML = "";

    // Gestione visibilità Hero
    if (search.trim().length > 0) {
        heroSection.classList.add('hidden');
        const heroVideo = heroSection.querySelector('video');
        if (heroVideo) heroVideo.pause();
    } else {
        const catalogSection = document.getElementById('catalogSection');
        if (catalogSection && catalogSection.classList.contains('hidden')) {
            heroSection.classList.remove('hidden');
        }
    }

    categories.forEach((cat, idx) => {
        const filtered = cat.videos.filter(v => v.title.toLowerCase().includes(search.toLowerCase()));
        if (filtered.length === 0) return;

        const rowId = `row-${idx}`;
        const section = document.createElement('div');
        
        // Creiamo le card
        const videoCardsHTML = filtered.map(v => {
            let cleanUrl = v.id.includes('raw=1') ? v.id : v.id.replace('dl=0', 'raw=1');
            const finalUrl = `${cleanUrl}#t=0.5`;
        
            return `
                <div class="video-card group">
                    <div class="aspect-video bg-black relative overflow-hidden rounded-t-3xl">
                        <video 
                            preload="metadata" 
                            playsinline 
                            webkit-playsinline
                            class="w-full h-full object-cover cursor-pointer" 
                            onclick="if(this.paused) { this.play(); this.controls=true; } else { this.pause(); }"
                            poster="favicon.png">
                            <source src="${finalUrl}" type="video/mp4">
                        </video>
                    </div>
                    
                    <div class="p-4 flex flex-col gap-3">
                        
                        <h3 class="text-[11px] font-bold uppercase text-zinc-100 line-clamp-2 leading-tight">${v.title}</h3>
                        
                        <div class="flex justify-between items-center pt-1 border-t border-zinc-800/50">
                            
                            <div class="flex items-center gap-1.5">
                                <div class="w-1 h-1 bg-blue-500 rounded-full"></div>
                                <span class="text-[8px] text-zinc-500 uppercase tracking-[0.2em] font-medium">Academy</span>
                            </div>
        
                            <div class="text-zinc-600/80 group-hover:text-yellow-500 transition-colors duration-300">
                                <i class="fas fa-bolt text-[10px]"></i>
                            </div>
        
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        
        section.innerHTML = `
            <div class="category-header">
                <h2 class="category-title"><i class="fas fa-play text-blue-500 text-[8px]"></i> ${cat.name}</h2>
                <div class="nav-controls flex gap-2">
                    <button class="nav-btn" onclick="scrollRow('${rowId}', -1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="nav-btn" onclick="scrollRow('${rowId}', 1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="${rowId}" class="video-row">
                ${videoCardsHTML}
            </div>
        `;
        container.appendChild(section);
    });
}

        function renderCatalogs() {
            const container = document.getElementById('catalogGrid');
            if (!container) return;
        
            // Puliamo il contenitore prima di riempirlo
            container.innerHTML = "";
        
            // Usiamo 'catalogs' (il nome della tua costante)
            catalogs.forEach(c => {
                const card = document.createElement('div');
                
                // Stile: Card scura, bordo sottile, layout verticale
                card.className = "bg-zinc-900/50 border border-zinc-800 p-6 rounded-3xl flex flex-col justify-between min-h-[160px] hover:border-blue-500/50 transition-all group cursor-pointer relative";
                
                // Link al click
                card.onclick = () => window.open(c.link, '_blank');
                
                card.innerHTML = `
                   <div class="flex justify-between items-start gap-4">
                <div class="flex-1 text-left">
                    <div class="flex items-center gap-2 mb-1">
                        <i class="fas fa-file-pdf text-lg text-blue-500/70"></i>
                        <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-medium">Documento PDF</span>
                    </div>
                    <h3 class="text-white font-bold uppercase tracking-tighter text-base group-hover:text-blue-400 transition-colors leading-tight">
                        ${c.title}
                    </h3>
                </div>
                
                <div class="mt-4">
                    <i class="fas fa-arrow-alt-circle-down text-zinc-600 group-hover:text-blue-500 text-xl transition-all transform group-hover:scale-110"></i>
                </div>
            </div>
        
                    <div class="flex justify-between items-center pt-3 border-t border-zinc-800/50 mt-4">
                        
                        <div class="flex items-center gap-1.5">
                            <div class="w-1 h-1 bg-blue-600 rounded-full"></div>
                            <span class="text-[8px] text-blue-500 uppercase tracking-[0.2em] font-black italic">Academy</span>
                        </div>
        
                        <div class="text-zinc-600 group-hover:text-yellow-500 transition-colors duration-300">
                            <i class="fas fa-bolt text-[10px]"></i>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.scrollRow = (id, dir) => {
            const row = document.getElementById(id);
            row.scrollBy({ left: dir * 300, behavior: 'smooth' });
        };

        function logout() { localStorage.removeItem('et_auth'); location.reload(); }
        document.getElementById('searchInput').addEventListener('input', (e) => renderVideos(e.target.value));
        if (localStorage.getItem('et_auth') === 'true') loadApp();
    </script>
